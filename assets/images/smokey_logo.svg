<svg width="100%" viewBox="0 0 680 160" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Smokey Logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Elegant cigar with smoke and SMOKEY wordmark in gold</desc>

  <defs>
    <clipPath id="cigarClip">
      <rect x="80" y="55" width="130" height="50" rx="25"/>
    </clipPath>
  </defs>

  <!-- Smoke wisps above cigar tip -->
  <path d="M96,52 C94,42 100,35 96,26 C92,17 98,10 95,2" stroke="#B8973A" stroke-width="2.2" fill="none" stroke-linecap="round" style="fill:none;stroke:rgb(184, 151, 58);color:rgb(255, 255, 255);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M104,54 C106,45 101,38 104,30 C107,22 103,16 106,8" stroke="#B8973A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(184, 151, 58);color:rgb(255, 255, 255);stroke-width:1.4px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Cigar body - main tube -->
  <rect x="88" y="55" width="118" height="50" rx="25" fill="#B8973A" style="fill:rgb(184, 151, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Lit end glow / ash tip -->
  <ellipse cx="91" cy="80" rx="8" ry="18" fill="#9A7A2E" style="fill:rgb(154, 122, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Band detail on cigar -->
  <rect x="148" y="55" width="22" height="50" fill="#9A7A2E" clip-path="url(#cigarClip)" style="fill:rgb(154, 122, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="150" y="55" width="18" height="50" fill="#B8973A" opacity="0.3" clip-path="url(#cigarClip)" style="fill:rgb(184, 151, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Thin highlight line along top of cigar -->
  <path d="M105,58 Q160,54 200,60" stroke="#D4AE55" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(212, 174, 85);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- SMOKEY wordmark -->
  <text x="230" y="97" font-family="'Playfair Display', 'Georgia', serif" font-size="76" font-weight="900" letter-spacing="5" fill="#B8973A" text-anchor="start" style="fill:rgb(184, 151, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Playfair Display&quot;, Georgia, serif;font-size:76px;font-weight:900;text-anchor:start;dominant-baseline:auto">SMOKEY</text>

</svg>