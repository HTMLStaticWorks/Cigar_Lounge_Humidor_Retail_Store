<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--bg);
        }
        .error-content {
            max-width: 600px;
            padding: 40px;
        }
        .error-code {
            font-size: clamp(100px, 20vw, 200px);
            font-family: var(--font-heading);
            font-weight: 900;
            line-height: 1;
            color: var(--surface);
            position: relative;
            z-index: 1;
        }
        .error-code::after {
            content: '404';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent);
            opacity: 0.1;
            z-index: -1;
            filter: blur(10px);
        }
        .smoke-icon {
            font-size: 64px;
            color: var(--accent);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="error-content">
        <div class="smoke-icon"><i class="ph ph-wind"></i></div>
        <div class="error-code">404</div>
        <h2 style="margin: 20px 0;">Looks like this page went up in smoke.</h2>
        <p style="margin-bottom: 40px;">The page you are looking for might have been moved or doesn't exist anymore.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>

</body>
</html>
