<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smokey | Login</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1541690491104-e22a07409292?q=80&w=2000') no-repeat center center;
            background-size: cover;
        }
        .auth-card {
            background: var(--bg);
            padding: 50px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-logo {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
        }
        .divider {
            margin: 30px 0;
            position: relative;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 15px;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-google {
            background: #FFFFFF;
            color: #1A1A1A;
            border-color: #DDDDDD;
        }
        .btn-email {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">SMOKEY</a>
        <h2 style="margin-bottom: 30px;">Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>

        <div class="divider">
            <span>Or continue with</span>
        </div>

        <button class="social-btn btn-google">
            <i class="ph ph-google-logo" style="color: #DB4437;"></i> Continue with Google
        </button>
        <button class="social-btn btn-email">
            <i class="ph ph-envelope"></i> Continue with Email
        </button>

        <p style="margin-top: 30px; font-size: 15px;">
            Don't have an account? <a href="register.html" style="color: var(--accent); font-weight: 700;">Register</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
