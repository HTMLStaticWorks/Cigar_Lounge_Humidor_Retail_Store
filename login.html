<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smokey | Login</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1541690491104-e22a07409292?q=80&w=2000') no-repeat center center;
            background-size: cover;
        }
        .auth-card {
            background: var(--bg);
            padding: 50px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-logo {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            padding-right: 45px; /* Space for eye icon */
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
        }
        .pass-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            transition: var(--transition);
        }
        .toggle-password:hover {
            color: var(--accent);
        }
        [dir="rtl"] .form-group input {
            padding-right: 12px;
            padding-left: 45px;
        }
        [dir="rtl"] .toggle-password {
            right: auto;
            left: 15px;
        }
        .divider {
            margin: 30px 0;
            position: relative;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 15px;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-google {
            background: #FFFFFF;
            color: #1A1A1A;
            border-color: #DDDDDD;
        }
        .btn-apple {
            background: var(--text);
            color: var(--bg);
        }
        .form-utils {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .forgot-pass {
            color: var(--accent);
            font-weight: 600;
            transition: var(--transition);
        }
        .forgot-pass:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
        .btn-apple:hover {
            background: var(--accent);
            color: var(--black);
        }
        .auth-toggles {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .auth-toggles .theme-toggle, .auth-toggles .rtl-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .auth-toggles button:hover {
            transform: translateY(-2px);
            background: var(--accent);
            color: var(--black);
            border-color: var(--accent);
        }
        [dir="rtl"] .auth-toggles {
            right: auto;
            left: 30px;
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding-top: 80px;
                overflow-y: hidden;
            }
            .auth-card {
                width: 92%;
                padding: 30px 20px;
            }
            .auth-toggles {
                top: 20px;
                right: 20px;
            }
            [dir="rtl"] .auth-toggles {
                left: 20px;
            }
            .auth-logo {
                font-size: 26px;
                margin-bottom: 15px;
            }
            .divider {
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>

    <div class="auth-toggles">
        <button class="theme-toggle" aria-label="Toggle Theme"><i class="ph ph-moon"></i></button>
        <button class="rtl-toggle" aria-label="Toggle RTL"><i class="ph ph-arrows-left-right"></i></button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">SMOKEY</a>
        <h2 style="margin-bottom: 30px;">Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="pass-wrapper">
                    <input type="password" placeholder="••••••••" required id="loginPass">
                    <i class="ph ph-eye toggle-password" data-target="loginPass"></i>
                </div>
            </div>
            <div class="form-utils">
                <label class="remember-me">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>

        <div class="divider">
            <span>Or continue with</span>
        </div>

        <button class="social-btn btn-google">
            <i class="ph ph-google-logo" style="color: #DB4437;"></i> Continue with Google
        </button>
        <button class="social-btn btn-apple">
            <i class="ph ph-apple-logo"></i> Continue with Apple
        </button>

        <p style="margin-top: 30px; font-size: 15px;">
            Don't have an account? <a href="register.html" style="color: var(--accent); font-weight: 700;">Register</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.getAttribute('data-target'));
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                btn.classList.toggle('ph-eye');
                btn.classList.toggle('ph-eye-slash');
            });
        });
    </script>
</body>
</html>
