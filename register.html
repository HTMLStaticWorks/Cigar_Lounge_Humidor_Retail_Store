<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smokey | Register</title>
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1595113316349-9fa4ee24f884?q=80&w=2000') no-repeat center center;
            background-size: cover;
        }
        .auth-card {
            background: var(--bg);
            padding: 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-logo {
            font-family: var(--font-heading);
            font-size: 32px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
        }
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            margin: 20px 0;
            font-size: 14px;
        }
        .terms-group input {
            margin-top: 4px;
        }
        .divider {
            margin: 20px 0;
            position: relative;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            padding: 0 15px;
            font-size: 12px;
            color: #888;
        }
        .social-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-google {
            background: #FFFFFF;
            color: #1A1A1A;
            border-color: #DDDDDD;
        }
        .btn-email {
            background: var(--text);
            color: var(--bg);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">SMOKEY</a>
        <h2 style="margin-bottom: 20px;">Join the Club</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required minlength="8">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required minlength="8">
                </div>
            </div>
            
            <div class="terms-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">I accept the <a href="#" style="color: var(--accent);">Terms & Conditions</a> and Privacy Policy.</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>

        <div class="divider">
            <span>Or register with</span>
        </div>

        <button class="social-btn btn-google">
            <i class="ph ph-google-logo" style="color: #DB4437;"></i> Continue with Google
        </button>
        <button class="social-btn btn-email">
            <i class="ph ph-envelope"></i> Continue with Email
        </button>

        <p style="margin-top: 20px; font-size: 15px;">
            Already a member? <a href="login.html" style="color: var(--accent); font-weight: 700;">Login</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            const pass = e.target.querySelectorAll('input[type="password"]')[0].value;
            const confirm = e.target.querySelectorAll('input[type="password"]')[1].value;
            
            if (pass !== confirm) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
